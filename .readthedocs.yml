version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "miniforge3-latest"
  jobs:
    create_environment:
      - mamba env create -n docs-env --file environment-files/readthedocs.yml
    build:
      html:
        - mamba run -n docs-env q2doc refresh-cache
        - mamba run -n docs-env make autodoc
        - mamba run -n docs-env make preview
        - mkdir -p $READTHEDOCS_OUTPUT
        - cp -a docs/_build/* $READTHEDOCS_OUTPUT/
conda:
  environment: environment-files/readthedocs.yml
formats:
  - pdf
